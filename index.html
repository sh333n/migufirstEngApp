<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>霧港奇談 · Fog Harbor Tales</title>
<meta name="description" content="用英文破解霧港謎案的學習卡牌冒險">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E1520">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="霧港奇談">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
:root{
  --bg:#0E1520; --bg2:#121B29; --card:#1A2433; --card2:#223044; --line:#2C3B50;
  --ink:#EAE5D6; --dim:#93A0B4; --faint:#5D6B80;
  --amber:#F0A437; --amber-deep:#C97F1B; --amber-soft:#3A2D17;
  --blue:#6B9AFF; --blue-deep:#3D6CD9; --blue-soft:#1B2A47;
  --ok:#6B9AFF; --bad:#E07B2E;  /* 對=藍✓ 錯=橘✗,色弱友善 */
  --r:20px; --shadow:0 10px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",Inter,sans-serif;
  font-size:16px; line-height:1.7; -webkit-font-smoothing:antialiased}
body{max-width:560px; margin:0 auto; min-height:100dvh;
  background:radial-gradient(120% 60% at 50% -10%, #1B2A40 0%, var(--bg) 55%)}
button{font-family:inherit; border:none; cursor:pointer; background:none; color:inherit}
input,textarea,select{font-family:inherit; font-size:16px; color:var(--ink)}
h1,h2,h3{margin:0}
.serif{font-family:"Noto Serif TC","Songti TC",PMingLiU,serif; letter-spacing:.06em}
.en{font-family:Inter,-apple-system,Georgia,serif}
.scr{display:none; padding:max(16px,env(safe-area-inset-top)) 18px max(26px,env(safe-area-inset-bottom)); animation:fog .35s ease}
.scr.active{display:block}
@keyframes fog{from{opacity:0; filter:blur(3px)}to{opacity:1; filter:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}

.card{background:var(--card); border:1px solid var(--line); border-radius:var(--r);
  box-shadow:var(--shadow); padding:18px; margin-bottom:14px}
.muted{color:var(--dim); font-size:13.5px}
.tag{display:inline-block; padding:3px 11px; border-radius:999px; font-size:12.5px; font-weight:700;
  background:var(--blue-soft); color:var(--blue)}
.tag.amber{background:var(--amber-soft); color:var(--amber)}
.btn{display:flex; width:100%; align-items:center; justify-content:center; gap:8px;
  padding:15px 18px; border-radius:16px; font-size:16.5px; font-weight:800;
  background:linear-gradient(180deg,#F4B254,var(--amber-deep)); color:#221502;
  box-shadow:0 6px 20px rgba(240,164,55,.25); transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn.blue{background:linear-gradient(180deg,#7BA6FF,var(--blue-deep)); color:#fff;
  box-shadow:0 6px 20px rgba(107,154,255,.25)}
.btn.ghost{background:var(--card2); color:var(--ink); box-shadow:none; border:1px solid var(--line)}
.btn.small{width:auto; padding:9px 16px; font-size:14px; border-radius:12px}
.btn[disabled]{opacity:.4; pointer-events:none}
.flexrow{display:flex; gap:10px; align-items:center}
.spacer{flex:1}
.divider{height:1px; background:var(--line); margin:14px 0}
.center{text-align:center}
.field{width:100%; padding:14px 16px; border-radius:14px; border:1.5px solid var(--line);
  background:var(--bg2); outline:none}
.field:focus{border-color:var(--amber)}
a{color:var(--blue)}

/* 標題畫面 */
/* ===== 圖片整合 ===== */
.scene-img{width:100%; aspect-ratio:16/9; object-fit:cover; border-radius:14px; display:block;
  border:1px solid var(--line); box-shadow:0 8px 20px rgba(0,0,0,.45); margin-bottom:12px}
.scene-img.tall{aspect-ratio:3/4; max-height:300px; margin:0 auto 12px}
.portrait-img{width:74px; height:74px; object-fit:cover; border-radius:14px; flex:none;
  border:1px solid var(--gold-dk); box-shadow:0 4px 12px rgba(0,0,0,.5)}
.portrait-lg{width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:16px; max-height:340px;
  border:1px solid var(--gold-dk); box-shadow:0 8px 22px rgba(0,0,0,.55); margin-bottom:12px; display:block}
.portrait-talk{width:150px; height:200px; object-fit:cover; border-radius:14px;
  border:1px solid var(--gold-dk); box-shadow:0 8px 22px rgba(0,0,0,.55); display:inline-block}
.enemy-img{width:96px; height:96px; object-fit:cover; border-radius:14px; flex:none;
  border:1px solid var(--line); box-shadow:0 4px 14px rgba(107,154,255,.3)}
.title-bg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0}
.title-bg-veil{position:absolute; inset:0; z-index:1;
  background:linear-gradient(180deg, rgba(11,16,24,.35) 0%, rgba(11,16,24,.2) 40%, rgba(11,16,24,.92) 100%)}
.titlewrap{min-height:88dvh; display:flex; flex-direction:column; justify-content:center; text-align:center}
.lighthouse{font-size:74px; filter:drop-shadow(0 0 26px rgba(240,164,55,.5)); animation:glow 3.2s ease-in-out infinite}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 14px rgba(240,164,55,.35))}50%{filter:drop-shadow(0 0 34px rgba(240,164,55,.7))}}
.gametitle{font-size:42px; font-weight:900; margin:14px 0 4px; letter-spacing:.14em}
.subtitle{color:var(--dim); letter-spacing:.32em; font-size:13px}

/* 狀態列 */
.statusbar{display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap}
.stat-pill{display:flex; align-items:center; gap:5px; background:var(--card); border:1px solid var(--line);
  border-radius:999px; padding:6px 13px; font-size:13.5px; font-weight:800}
.hpdots i{display:inline-block; width:9px; height:9px; border-radius:50%; margin-left:3px; background:var(--line)}
.hpdots i.on{background:var(--amber)}
.hpdots.san i.on{background:var(--blue)}

/* 調查員 */
.invcard{display:flex; gap:14px; align-items:center; text-align:left; width:100%;
  background:var(--card); border:1.5px solid var(--line); border-radius:var(--r); padding:16px; margin-bottom:12px}
.invcard.on{border-color:var(--amber); background:var(--card2)}
.invcard .emo{font-size:40px}
.invcard b{font-size:17px}
.invcard p{margin:2px 0 0; font-size:13px; color:var(--dim); line-height:1.5}

/* 劇情 */
.story{font-size:16.5px; line-height:2; letter-spacing:.02em}
.story .en-line{display:block; background:var(--bg2); border-left:3px solid var(--amber);
  padding:10px 14px; border-radius:0 12px 12px 0; margin:10px 0; font-size:16px}
.speakbtn{width:34px; height:34px; border-radius:11px; background:var(--blue-soft); color:var(--blue);
  font-size:15px; display:inline-flex; align-items:center; justify-content:center; vertical-align:middle; flex:none}

/* 答題 */
.clue{background:var(--bg2); border:1px dashed var(--amber-deep); border-radius:14px; padding:13px 15px;
  font-size:16.5px; margin:10px 0}
.opt{display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:14px 16px;
  border-radius:15px; background:var(--card); border:1.5px solid var(--line); margin-bottom:10px;
  font-size:15.5px; font-weight:600}
.opt .mk{flex:none; width:26px; height:26px; border-radius:9px; background:var(--bg2);
  display:flex; align-items:center; justify-content:center; font-size:13.5px; font-weight:800; color:var(--dim)}
.opt.correct{border-color:var(--ok); background:var(--blue-soft)}
.opt.correct .mk{background:var(--ok); color:#fff}
.opt.wrong{border-color:var(--bad); background:#3A2412}
.opt.wrong .mk{background:var(--bad); color:#fff}
.opt.gone{opacity:.28; pointer-events:none; text-decoration:line-through}
.explain{border-left:4px solid var(--amber); background:var(--amber-soft); border-radius:0 13px 13px 0;
  padding:12px 14px; font-size:14.5px; margin:8px 0 12px}
.progress{height:7px; background:var(--line); border-radius:99px; overflow:hidden; margin:6px 0 14px}
.progress i{display:block; height:100%; background:linear-gradient(90deg,var(--amber),#F4C36F); transition:width .3s}

/* 手牌 */
.hand{display:flex; gap:9px; overflow-x:auto; padding:4px 0 8px; margin:4px 0}
.pcard{flex:none; width:108px; background:linear-gradient(160deg,var(--card2),var(--card));
  border:1.5px solid var(--line); border-radius:14px; padding:10px 10px 8px; text-align:left}
.pcard b{font-size:14.5px; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.pcard .fx{font-size:11px; color:var(--amber); font-weight:700; margin-top:3px; line-height:1.4}
.pcard .zh{font-size:11.5px; color:var(--dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.pcard.dusty{opacity:.45; filter:grayscale(.6)}
.pcard.used{opacity:.3; pointer-events:none}
.pcard:active{transform:scale(.96)}

/* 符記 */
.tokenpop{display:inline-flex; align-items:center; gap:6px; background:var(--card2);
  border:1px solid var(--amber-deep); border-radius:999px; padding:5px 14px; font-weight:800; color:var(--amber)}

/* 對話 */
.chat{display:flex; flex-direction:column; gap:10px; margin:10px 0}
.bub{max-width:84%; padding:11px 15px; border-radius:18px; border:1px solid var(--line)}
.bub.ai{background:var(--card); border-bottom-left-radius:6px; align-self:flex-start}
.bub.me{background:var(--blue-soft); border-color:var(--blue-deep); border-bottom-right-radius:6px; align-self:flex-end}
.bub .hint{margin-top:6px; font-size:12.5px; color:var(--amber); background:var(--amber-soft); padding:5px 9px; border-radius:9px}
.micbtn{width:80px; height:80px; border-radius:50%; background:linear-gradient(180deg,#7BA6FF,var(--blue-deep));
  color:#fff; font-size:30px; box-shadow:0 8px 26px rgba(107,154,255,.35);
  display:flex; align-items:center; justify-content:center; margin:0 auto; transition:transform .12s}
.micbtn.rec{background:linear-gradient(180deg,#F4B254,var(--amber-deep)); transform:scale(1.12)}

/* 怪物 */
.enemy{display:flex; align-items:center; gap:14px}
.enemy .emo{font-size:48px; filter:drop-shadow(0 0 14px rgba(107,154,255,.4))}
.enemy .bar{height:10px; background:var(--line); border-radius:99px; overflow:hidden; margin-top:6px}
.enemy .bar i{display:block; height:100%; background:var(--bad); transition:width .3s}
.shake{animation:shake .4s}
@keyframes shake{25%{transform:translateX(-6px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}

/* 彈窗 / 載入 */
.overlay{position:fixed; inset:0; background:rgba(5,9,15,.72); z-index:90; display:none;
  align-items:flex-end; justify-content:center; backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.sheet{background:var(--card); border-top:1px solid var(--line); width:min(560px,100%);
  border-radius:24px 24px 0 0; padding:24px 20px max(24px,env(safe-area-inset-bottom));
  max-height:88dvh; overflow:auto; animation:up .26s ease}
@keyframes up{from{transform:translateY(40px); opacity:0}to{transform:none; opacity:1}}
#loading{position:fixed; inset:0; z-index:99; background:rgba(14,21,32,.88); display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:14px; backdrop-filter:blur(3px)}
#loading.show{display:flex}
.lamp{font-size:44px; animation:glow 1.6s ease-in-out infinite}
#toast{position:fixed; left:50%; transform:translateX(-50%); bottom:34px; z-index:98;
  background:var(--ink); color:#16202E; padding:11px 20px; border-radius:999px; font-size:14px;
  font-weight:800; opacity:0; pointer-events:none; transition:opacity .25s; max-width:86%; text-align:center}
#toast.show{opacity:1}
.empty{text-align:center; padding:30px 10px; color:var(--dim)}
.empty .emo{font-size:40px; display:block; margin-bottom:8px}
.minirow{display:flex; align-items:flex-start; gap:8px; padding:9px 0; border-bottom:1px dashed var(--line)}
.minirow:last-child{border-bottom:none}
.backrow{display:flex; margin-bottom:10px}
.backbtn{font-size:14px; font-weight:800; color:var(--dim); padding:6px 10px 6px 0}
</style>
</head>
<body>

<!-- 標題 -->
<section class="scr active" id="scr-title">
  <img class="title-bg" src="img/bg-title.jpg" alt="" onerror="this.style.display='none'">
  <div class="title-bg-veil"></div>
  <div class="titlewrap" style="position:relative; z-index:2">
    <div class="lighthouse">🗼</div>
    <h1 class="gametitle serif">霧港奇談</h1>
    <div class="subtitle serif">FOG HARBOR TALES · 1926</div>
    <p class="muted" style="margin:22px auto 26px; max-width:300px">霧從未散去。失蹤的燈塔守、聽不懂的耳語——<br>唯有讀懂英文的人,能在霧中前行。</p>
    <button class="btn" onclick="enterGame()">⚓ 進入霧港</button>
    <div style="height:10px"></div>
    <button class="btn ghost" onclick="openSettings()">⚙️ 設定</button>
  </div>
</section>

<!-- 調查員選擇 -->
<section class="scr" id="scr-char">
  <h2 class="serif" style="font-size:22px; margin-bottom:6px">選擇你的調查員</h2>
  <p class="muted" style="margin:0 0 16px">屬性會隨著答題成長。調查=單字 · 意志=文法 · 口才=口說</p>
  <div id="char-list"></div>
  <button class="btn" id="char-go" disabled onclick="confirmChar()">開始調查 →</button>
</section>

<!-- 事務所(主畫面) -->
<section class="scr" id="scr-hub"></section>

<!-- 冒險進行 -->
<section class="scr" id="scr-play"></section>

<!-- 牌庫 -->
<section class="scr" id="scr-deck"></section>

<!-- 俚語手帳 -->
<section class="scr" id="scr-slang"></section>

<!-- API Key -->
<div class="overlay" id="key-overlay">
  <div class="sheet">
    <h3 style="font-size:20px">🔑 點亮燈塔之前…</h3>
    <p class="muted" style="margin:10px 0 4px">本遊戲由 Google Gemini AI 驅動劇情與出題。金鑰只存在<b>你的手機</b>,不會上傳。</p>
    <ol style="font-size:14px; color:var(--dim); padding-left:20px; margin:8px 0 14px; line-height:1.9">
      <li>打開 <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>(免費)</li>
      <li>登入 → 「Create API key」→ 複製</li>
      <li>貼到下面</li>
    </ol>
    <input class="field en" id="key-input" placeholder="貼上 API key(AIza 開頭)" autocomplete="off">
    <div style="height:12px"></div>
    <button class="btn" onclick="saveKey()">點亮燈塔 🔦</button>
  </div>
</div>

<!-- 設定 -->
<div class="overlay" id="settings-overlay" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="sheet" id="settings-sheet"></div>
</div>

<div id="loading"><div class="lamp">🏮</div><div class="muted" id="loading-text" style="font-weight:700">霧正在聚集…</div></div>
<div id="toast"></div>

<script>
/* ================= 基礎 ================= */
const DAY = 86400000;
const SRS = [1,3,7,14];
const LEVELS = ['國中基礎','國中進階','高中入門'];
function defaults(){ return {
  player:null, // {char, stats:{inv,will,talk}, hp,maxhp,san,maxsan, xp}
  deck:[],     // {word, zh, pos, example_en, example_zh, usage, dusty, restedUntil, srs:{level,next}}
  nightmares:[], // {q,options,answer,explain,topic,next,fails}
  slang:[],    // {phrase, zh, example_en, example_zh}
  prog:{ch:1, enc:0, clues:0, done:false},
  daily:null,
  streak:{last:'',count:0},
  gstats:{correct:0,total:0,purified:0},
  settings:{level:'國中基礎', textModel:'gemini-2.5-flash'}
};}
let DB = defaults();
try{ const r = localStorage.getItem('fog_data'); if(r) DB = Object.assign(defaults(), JSON.parse(r)); }catch(e){}
function save(){ localStorage.setItem('fog_data', JSON.stringify(DB)); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function endOfDay(){ const d=new Date(); d.setHours(23,59,59,0); return d.getTime(); }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// 圖片元件:載入失敗自動隱藏,露出底下的 emoji/SVG fallback
function img(src, cls, alt){ return src?`<img class="${cls}" src="img/${src}" alt="${esc(alt||'')}" loading="lazy" onerror="this.style.display='none'">`:''; }
function qesc(s){ return esc(s).replace(/'/g,"\\'"); }
function $(id){ return document.getElementById(id); }
function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

let toastTimer;
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }
function loading(on,txt){ $('loading-text').textContent=txt||'霧正在聚集…'; $('loading').classList.toggle('show',!!on); }
async function withLoading(txt,fn){
  loading(true,txt);
  try{ return await fn(); }
  catch(e){ console.error(e);
    if(String(e.message).includes('NO_KEY')) $('key-overlay').classList.add('show');
    else if(String(e.message).includes('429')) toast('⚠️ 今日 AI 額度用完了,稍後或明天再試');
    else if(!navigator.onLine) toast('⚠️ 沒有網路,霧港需要連線才能運作');
    else toast('⚠️ 霧太濃了(發生錯誤),再試一次');
    return null;
  } finally{ loading(false); }
}

function apiKey(){ return localStorage.getItem('fog_key')||''; }
async function gemini(prompt, opts={}){
  const key=apiKey(); if(!key) throw new Error('NO_KEY');
  const model=opts.model||DB.settings.textModel;
  const body={contents:[{role:'user',parts:[{text:prompt}]}], generationConfig:{}};
  if(opts.system) body.systemInstruction={parts:[{text:opts.system}]};
  if(opts.json!==false) body.generationConfig.responseMimeType='application/json';
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){ const t=await r.text(); throw new Error('API '+r.status+' '+t.slice(0,200)); }
  const d=await r.json();
  let text=(d.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
  if(opts.json!==false){ text=text.replace(/^```json\s*/i,'').replace(/```\s*$/,'').trim(); return JSON.parse(text); }
  return text;
}

/* ====== 語音 ====== */
let voices=[];
function loadVoices(){ voices=speechSynthesis.getVoices(); }
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function speak(t,rate){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=rate||0.92;
  const v=voices.find(v=>/en[-_]US/i.test(v.lang))||voices.find(v=>/^en/i.test(v.lang));
  if(v) u.voice=v;
  speechSynthesis.speak(u);
}
const SRX = window.SpeechRecognition||window.webkitSpeechRecognition;

/* ====== 畫面切換 ====== */
function showScr(n){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active'));
  $('scr-'+n).classList.add('active');
  window.scrollTo(0,0);
}

/* ================= 角色 ================= */
const CHARS=[
  {id:'rep', emo:'📰', img:'char-rep.jpg', name:'外電記者 林晚晴', desc:'靠翻譯外電維生,調查力出眾。', stats:{inv:3,will:1,talk:2}, hp:5, san:6},
  {id:'doc', emo:'🩺', img:'char-doc.jpg', name:'港區醫師 沈鶴年', desc:'讀慣原文醫書,意志堅定。', stats:{inv:1,will:3,talk:2}, hp:6, san:5},
  {id:'stu', emo:'🎓', img:'char-stu.jpg', name:'返鄉學生 阿海', desc:'剛從外地學成歸來,能言善道。', stats:{inv:2,will:1,talk:3}, hp:5, san:5},
];
let pickedChar=null;
function renderCharSelect(){
  $('char-list').innerHTML = CHARS.map(c=>`
    <button class="invcard" id="ch-${c.id}" onclick="pickChar('${c.id}')">
      <span class="emo" style="position:relative">${img(c.img,'portrait-img',c.name)}${c.img?'':c.emo}</span>
      <span><b>${c.name}</b><p>${c.desc}</p>
      <p style="color:var(--amber)">🔍 調查 ${c.stats.inv} · 🧠 意志 ${c.stats.will} · 💬 口才 ${c.stats.talk} · ❤️ ${c.hp} · 🌀 ${c.san}</p></span>
    </button>`).join('');
  showScr('char');
}
function pickChar(id){ pickedChar=id;
  CHARS.forEach(c=>$('ch-'+c.id).classList.toggle('on', c.id===id));
  $('char-go').disabled=false;
}
function confirmChar(){
  const c=CHARS.find(x=>x.id===pickedChar);
  DB.player={char:c.id, stats:{...c.stats}, hp:c.hp, maxhp:c.hp, san:c.san, maxsan:c.san, xp:0};
  save(); renderHub(); showScr('hub');
}
function charOf(){ return CHARS.find(c=>c.id===DB.player.char); }

/* ================= 事務所(Hub) ================= */
function updateStreak(){
  const t=todayStr(), s=DB.streak;
  if(s.last===t) return;
  const y=new Date(Date.now()-DAY);
  const ys=y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
  s.count=(s.last===ys)?s.count+1:1; s.last=t; save();
}
function dueCards(){ const n=Date.now(); return DB.deck.filter(c=>c.srs.next<=n); }
function dueNightmares(){ const n=Date.now(); return DB.nightmares.filter(x=>x.next<=n); }
function statusBar(){
  const p=DB.player;
  const dots=(cur,max,cls)=>`<span class="hpdots ${cls}">`+Array.from({length:max},(_,i)=>`<i class="${i<cur?'on':''}"></i>`).join('')+`</span>`;

    <span class="stat-pill">❤️ ${dots(p.hp,p.maxhp,'')}</span>

    <span class="stat-pill">🔍${p.stats.inv} 🧠${p.stats.will} 💬${p.stats.talk}</span>

/* ================= 卡牌 ================= */
function cardEffect(pos){
  if(/v/.test(pos||'')) return {key:'verb', label:'⚡ 行動:答對時額外 +1 線索/傷害'};
  if(/adj|adv/.test(pos||'')) return {key:'shield', label:'🛡 增益:下次答錯免受傷'};
  return {key:'item', label:'🔦 道具:刪去一個錯誤選項'};
}
function addCard(w){
  if(DB.deck.find(c=>c.word.toLowerCase()===w.word.toLowerCase())) return false;
  DB.deck.push({word:w.word, zh:w.zh, pos:w.pos||'n.', example_en:w.example_en||'', example_zh:w.example_zh||'',
    usage:w.usage||'', dusty:false, restedUntil:0, srs:{level:0, next:Date.now()+SRS[0]*DAY}});
  save(); return true;
}
function refreshDust(){ const n=Date.now();
  DB.deck.forEach(c=>{ if(c.srs.next<=n-2*DAY) c.dusty=true; }); save();
}
function renderDeck(){
  refreshDust();
  const due=dueCards();
  $('scr-deck').innerHTML=`
    <div class="backrow"><button class="backbtn" onclick="renderHub()">← 回事務所</button></div>
    <h2 class="serif" style="font-size:22px">🃏 我的牌庫</h2>
    <p class="muted" style="margin:4px 0 14px">每張卡都是你學會的單字。到期不複習會「蒙塵」失效——用記憶儀式擦亮它。</p>
    ${due.length?`<button class="btn" style="margin-bottom:14px" onclick="startRitual()">🕯 記憶儀式(${due.length} 張到期)</button>`:''}
    ${DB.deck.length?`<div class="card">${[...DB.deck].sort((a,b)=>a.srs.next-b.srs.next).map(c=>{
      const fx=cardEffect(c.pos);
      return `<div class="minirow"><b class="en">${esc(c.word)}</b><span class="tag">${esc(c.pos)}</span>
        <span class="muted">${esc(c.zh)}</span><span class="spacer"></span>
        ${c.dusty?'<span class="tag" style="background:#2A2A2A;color:#888">蒙塵</span>':`<span class="muted" style="font-size:11.5px">${fx.label.split(':')[0]}</span>`}
        <button class="speakbtn" onclick="speak('${qesc(c.word)}')">🔊</button></div>`;}).join('')}</div>`
    :`<div class="empty"><span class="emo">🌫</span>牌庫還是空的。<br>去冒險中破譯單字,它們會化為你的卡牌。</div>`}`;
  showScr('deck');
}
/* 記憶儀式 = SRS 複習 */
let ritualQ=[];
function startRitual(){ ritualQ=dueCards(); if(!ritualQ.length) return toast('沒有到期的卡');
  nextRitual(); }
function nextRitual(){
  if(!ritualQ.length){
    $('scr-deck').innerHTML=`<div class="card center"><div style="font-size:44px">🕯</div>
      <h3 class="serif">儀式完成</h3><p class="muted">所有卡牌重新泛起微光。</p>
      <button class="btn" style="margin-top:10px" onclick="renderDeck()">回牌庫</button></div>`;
    return;
  }
  const c=ritualQ[0];
  $('scr-deck').innerHTML=`
    <div class="muted center" style="margin:10px 0">記憶儀式 · 剩 ${ritualQ.length} 張</div>
    <div class="card center">
      <div class="en" style="font-size:32px;font-weight:800">${esc(c.word)}</div>
      <button class="speakbtn" style="margin:8px auto" onclick="speak('${qesc(c.word)}')">🔊</button>
      <div id="rt-ans" style="display:none;margin:6px 0"><span class="tag" style="font-size:15px">${esc(c.zh)}</span>
        ${c.example_en?`<div class="clue en" style="text-align:left">${esc(c.example_en)}<div class="muted">${esc(c.example_zh)}</div></div>`:''}</div>
      <div id="rt-btns" style="margin-top:12px">
        <button class="btn ghost" onclick="$('rt-ans').style.display='';$('rt-btns').innerHTML='<div class=flexrow><button class=\\'btn ghost\\' style=\\'color:var(--bad)\\' onclick=gradeRitual(false)>✗ 忘了</button><button class=\\'btn blue\\' onclick=gradeRitual(true)>✓ 記得</button></div>'">顯示答案</button>
      </div></div>`;
  showScr('deck');
}
function gradeRitual(ok){
  const c=ritualQ.shift();
  c.srs.level = ok? Math.min(c.srs.level+1,SRS.length-1) : 0;
  c.srs.next = Date.now()+SRS[c.srs.level]*DAY;
  c.dusty=false; save(); nextRitual();
}

/* ================= 答題引擎(共用) ================= */
let pending={remove:false, bonus:false, shield:false};
function handHTML(){
  const n=Date.now();
  const avail=DB.deck.filter(c=>!c.dusty && c.restedUntil<n);
  if(!avail.length) return '';
  const hand=avail.sort(()=>Math.random()-.5).slice(0,3);
  return `<div class="muted" style="margin-top:8px">🃏 打出一張手牌助你一臂之力(每張每日一次):</div>
    <div class="hand">${hand.map(c=>{const fx=cardEffect(c.pos);
      return `<button class="pcard" id="hc-${esc(c.word)}" onclick="playCard('${qesc(c.word)}')">
        <b class="en">${esc(c.word)}</b><span class="zh">${esc(c.zh)}</span><span class="fx">${fx.label}</span></button>`;}).join('')}</div>`;
}
function playCard(word){
  const c=DB.deck.find(x=>x.word===word); if(!c) return;
  const fx=cardEffect(c.pos);
  c.restedUntil=endOfDay(); save();
  const el=document.getElementById('hc-'+word); if(el) el.classList.add('used');
  if(fx.key==='item'){
    const wrongs=[...document.querySelectorAll('.opt:not(.gone)')].filter(b=>b.dataset.ok!=='1');
    if(wrongs.length>1) rnd(wrongs).classList.add('gone');
    toast(`🔦 ${word}:排除了一個錯誤選項`);
  }else if(fx.key==='verb'){ pending.bonus=true; toast(`⚡ ${word}:答對將獲得額外獎勵`); }
  else { pending.shield=true; toast(`🛡 ${word}:下次答錯不會受傷`); }
}
const CHAOS=[{t:'+1',v:1},{t:'+1',v:1},{t:'0',v:0},{t:'+2',v:2},{t:'★ 古印',v:1,star:true}];
function renderQuestion(container, q, opts){
  pending={remove:false,bonus:false,shield:false};
  q.answer = Number(q.answer); // 正規化:防止 AI 回傳字串型別的索引
  if(!Number.isInteger(q.answer) || q.answer<0 || q.answer>=(q.options||[]).length) q.answer=0;
  container.innerHTML=`
    ${q.clue?`<div class="clue en">${esc(q.clue)} <button class="speakbtn" onclick="speak('${qesc(q.clue)}')">🔊</button></div>`:''}
    <div style="font-weight:700; font-size:16.5px" class="${q.clue?'':'en'}">${esc(q.q)}</div>
    <div id="q-opts" style="margin-top:12px">${q.options.map((o,i)=>`
      <button class="opt" data-ok="${i===q.answer?1:0}" onclick="judge(this,${i})">
        <span class="mk">${'ABCD'[i]}</span><span class="${/[a-zA-Z]/.test(o)?'en':''}">${esc(o)}</span></button>`).join('')}</div>
    ${opts.kind==='nightmare'?'':handHTML()}
    <div id="q-after"></div>`;
  container._q=q; container._opts=opts;
  window._qc=container;
}
function judge(btn,pick){
  const c=window._qc, q=c._q, o=c._opts;
  const ok = pick===q.answer;
  DB.gstats.total++; if(ok) DB.gstats.correct++;
  document.querySelectorAll('#q-opts .opt').forEach((b,i)=>{
    b.disabled=true;
    if(b.dataset.ok==='1'){ b.classList.add('correct'); b.querySelector('.mk').textContent='✓'; }
    if(i===pick&&!ok){ b.classList.add('wrong'); b.querySelector('.mk').textContent='✗'; }
  });
  let extra='';
  if(ok && o.kind!=='nightmare' && o.kind!=='daily'){
    const tk=rnd(CHAOS);
    let gain=1+tk.v+(pending.bonus?1:0);
    extra=`<div class="tokenpop">混沌符記:${tk.t} → 獲得 ${gain} 線索${tk.star?' · 古印共鳴!':''}</div>`;
    o._gain=gain;
  }
  if(!ok && o.kind!=='daily'){
    if(pending.shield){ extra=`<div class="tokenpop">🛡 護盾擋下了傷害</div>`; }
    else o._hurt=true;
    if(o.kind!=='nightmare') addNightmare(q, o.topic||'');
  }
  save();
  $('q-after').innerHTML=`
    <div class="explain"><b>${ok?'✓ 答對了!':'✗ 答錯了——記住這個觀念:'}</b><br>${esc(q.explain)}</div>
    ${extra}<div style="height:12px"></div>
    <button class="btn" id="q-next">繼續 →</button>`;
  $('q-next').onclick=()=>o.onDone(ok);
}
function addNightmare(q, topic){
  DB.nightmares.push({q:q.q, clue:q.clue||'', options:q.options, answer:q.answer, explain:q.explain,
    topic, next:Date.now()+SRS[0]*DAY, fails:0});
  save();
}
function gainXP(stat, n){
  const p=DB.player; const before=p.xp; p.xp+=n||1;
  // 每跨越一個 8 的倍數就提升一次屬性(用區間判斷,避免 +2 跳過門檻)
  if(stat && Math.floor(p.xp/8) > Math.floor(before/8)){
    const key = stat==='inv'?'inv' : stat==='talk'?'talk' : 'will';
    p.stats[key]++; toast('📈 '+(key==='inv'?'調查':key==='talk'?'口才':'意志')+'提升!');
  }
  save();
}
function hurt(kind){
  const p=DB.player;
  if(kind==='hp') p.hp=Math.max(0,p.hp-1); else p.san=Math.max(0,p.san-1);
  save();
  if(p.hp===0||p.san===0){
    p.hp=Math.max(p.hp,Math.ceil(p.maxhp/2)); p.san=Math.max(p.san,Math.ceil(p.maxsan/2)); save();
    toast('你勉強撤回事務所喘口氣…(已恢復部分狀態)');
  }
}

function playNext(){
  const nm=dueNightmares();
  if(nm.length){ startNightmares(true); return; }
  const pr=DB.prog;
  if(pr.enc < CH1.encounters.length){
    if(pr.enc===0 && pr.clues===0) return showIntro();
    runEncounter(CH1.encounters[pr.enc]);
  } else if(!pr.done){ runBoss(); }
}

  $('scr-play').innerHTML=`

/* ---- 調查遭遇(單字) ---- */
async function runEncounter(e){
  if(e.type==='investigate') return runInvestigate(e);
  if(e.type==='combat') return runCombat(e);
  if(e.type==='talk') return runTalk(e);
}
async function runInvestigate(e){
  const qs=await withLoading('破譯字跡中…',()=>gemini(
`你是英文老師兼1920年代偵探小說作家。為程度「${DB.settings.level}」的台灣學生出 ${e.n} 題單字題。
場景:${e.scene}。素材主題:${e.theme}。氛圍:偵探詭異(不血腥)。
每題給一句英文線索(日誌/警語/信件其中一句,內含一個目標單字),問該單字意思。單字要符合程度且實用。
回傳 JSON 陣列:[{"clue":"英文線索句","q":"中文提問,例如:句中的 vanish 是什麼意思?","word":"目標單字","pos":"n.|v.|adj.|adv.","options":["繁中選項1","2","3","4"],"answer":0,"explain":"繁中詳解:單字意思、用法、常見搭配、記憶訣竅(90字內)","word_zh":"單字的中文意思","example_en":"另一個例句","example_zh":"例句翻譯"}]`));
  if(!qs||!Array.isArray(qs)) return;
  let i=0, got=0;
  const step=()=>{
    if(i>=qs.length) return finishInvestigate(e,got,qs);
    $('scr-play').innerHTML=`${encHeader(e)}
      <div class="muted">破譯 ${i+1} / ${qs.length}</div>
      <div class="progress"><i style="width:${i/qs.length*100}%"></i></div>
      <div class="card" id="q-box"></div>`;
    showScr('play');
    renderQuestion($('q-box'), qs[i], {kind:'inv', topic:'單字', onDone:(ok)=>{
      if(ok){ DB.prog.clues += ($('q-box')._opts._gain||1); got++; gainXP('inv',1); }
      else if($('q-box')._opts._hurt) hurt('san');
      save(); i++; step();
    }});
  };
  step();
}
function finishInvestigate(e,got,qs){
  const newWords=qs.filter(q=>q.word && !DB.deck.find(c=>c.word.toLowerCase()===q.word.toLowerCase()));
  $('scr-play').innerHTML=`${statusBar()}
    <div class="card center"><div style="font-size:40px">🔎</div>
      <h3 class="serif">${esc(e.scene)} · 調查完成</h3>
      <p class="muted">破譯成功 ${got}/${qs.length} · 目前線索 ${DB.prog.clues}</p></div>
    ${newWords.length?`<div class="card"><b>📦 破譯出的單字,收為卡牌:</b>
      ${newWords.map(q=>`<div class="minirow"><b class="en">${esc(q.word)}</b><span class="tag">${esc(q.pos)}</span>
        <span class="muted">${esc(q.word_zh)}</span>
        <button class="speakbtn" style="margin-left:auto" onclick="speak('${qesc(q.word)}')">🔊</button></div>`).join('')}
      <div style="height:10px"></div>
      <button class="btn blue" id="take-cards">全部收入牌庫 🃏</button></div>`:''}
    <button class="btn" onclick="advance()">前往下一站 →</button>`;
  showScr('play');
  const tb=$('take-cards');
  if(tb) tb.onclick=()=>{ newWords.forEach(q=>addCard({word:q.word, zh:q.word_zh, pos:q.pos,
      example_en:q.example_en, example_zh:q.example_zh, usage:''}));
    tb.textContent='已收入 ✓'; tb.disabled=true; toast('卡牌入庫!'); };
}
function advance(){ DB.prog.enc++; save(); renderHub(); }

/* ---- 對抗遭遇(文法) ---- */
async function runCombat(e, boss){
  const en = boss? CH1.boss : e.enemy;
  const n = boss? CH1.boss.n : e.n;
  const qs=await withLoading('霧中有東西在動…',()=>gemini(
`你是英文老師。為程度「${DB.settings.level}」的台灣學生出 ${n} 題英文文法選擇題,主題混合(時態、助動詞、介系詞、冠詞、比較級、關係代名詞等,依程度)。
題目句子的內容請帶有1920年代港口、霧、燈塔、神秘事件的氛圍(不血腥)。克漏字用 ____。
回傳 JSON 陣列:[{"q":"題目英文句","options":["4個英文選項"],"answer":0,"explain":"繁中詳解:考哪個文法點、為何對、其他為何錯(100字內)","topic":"文法主題如:過去式"}]`));
  if(!qs||!Array.isArray(qs)) return;
  let i=0, ehp=en.hp;
  const step=()=>{
    if(ehp<=0) return winCombat(e,en,boss);
    if(i>=qs.length){ // 題目用完未擊倒 → 再戰
      $('scr-play').innerHTML=`${statusBar()}
        <div class="card center"><div style="font-size:40px">${en.emo}</div>
        <h3 class="serif">${esc(en.name)} 仍在霧中徘徊…</h3>
        <p class="muted">它的低語還剩 ${ehp} 分力量。深呼吸,再次迎戰。</p>
        <button class="btn" onclick="${boss?'runBoss()':'playNext()'}">再戰 ⚔️</button>
        <div style="height:8px"></div>
        <button class="btn ghost" onclick="renderHub()">先撤回事務所</button></div>`;
      showScr('play'); return;
    }
    $('scr-play').innerHTML=`${encHeader(boss?CH1.boss:e)}
      <div class="card"><div class="enemy"><span class="emo" id="enemy-emo">${en.emo}</span>
        <div style="flex:1"><b>${esc(en.name)}</b>
        <div class="bar"><i style="width:${ehp/en.hp*100}%"></i></div>
        <div class="muted" style="font-size:12px">低語強度 ${ehp}/${en.hp} · 答對文法即可削弱它</div></div></div></div>
      <div class="card" id="q-box"></div>`;
    showScr('play');
    renderQuestion($('q-box'), qs[i], {kind:'combat', topic:qs[i].topic||'文法', onDone:(ok)=>{
      if(ok){ ehp -= 1+($('q-box')._opts._gain>2?1:0); gainXP('will',1);
        const em=$('enemy-emo'); if(em) em.classList.add('shake'); }
      else if($('q-box')._opts._hurt) hurt('hp');
      i++; step();
    }});
  };
  step();
}
function winCombat(e,en,boss){
  if(boss) return chapterEnding();
  DB.prog.clues+=2; save();
  $('scr-play').innerHTML=`${statusBar()}
    <div class="card center"><div style="font-size:44px">💨</div>
      <h3 class="serif">${esc(en.name)} 散成了霧</h3>
      <p class="muted">你的句子像火光一樣準確。線索 +2(目前 ${DB.prog.clues})</p></div>
    <button class="btn" onclick="advance()">前往下一站 →</button>`;
  showScr('play');
}

/* ---- 交涉遭遇(口說) ---- */
let talkState=null;
function talkSystem(e){
  return `You are role-playing "${e.npc}" in a 1926 foggy harbor town detective story. You ONLY speak English, suited to a Taiwanese learner at ${DB.settings.level==='高中入門'?'high-school beginner':'junior high school'} level (short, clear sentences, max 2 per turn). Stay in character: a bit mysterious but kind. The player (a detective) is trying to: ${e.mission}. Reveal information gradually over about 3 exchanges. Mild eerie mood, never gory.`;
}
async function runTalk(e){
  talkState={e, hist:[]};
  const r=await withLoading('推開酒館的門…',()=>gemini(
    `Open the scene with your first line to the detective. JSON: {"reply":"your English line","hint":"給玩家的繁中提示:可以怎麼用英文回(25字內)"}`,
    {system:talkSystem(e)}));
  if(!r){ renderHub(); return; }
  talkState.hist.push({role:'ai',text:r.reply,hint:r.hint});
  renderTalk(); speak(r.reply);
}
function renderTalk(){
  const e=talkState.e;
  $('scr-play').innerHTML=`${encHeader(e)}
    <div class="muted">🎯 任務:${esc(e.mission)} · 對話 ${talkState.hist.filter(m=>m.role==='me').length}/3 回合後可結算</div>
    ${e.npcImg?`<div style="text-align:center;margin:10px 0">${img(e.npcImg,'portrait-talk','Old Joe')}</div>`:''}
    <div class="chat" id="talk-chat"></div>
    <div class="center" style="margin:14px 0 4px">
      <button class="micbtn" id="mic"
        ontouchstart="micDown(event)" ontouchend="micUp(event)"
        onmousedown="micDown(event)" onmouseup="micUp(event)">🎤</button>
      <p class="muted" style="margin-top:8px" id="mic-hint">按住,用英文開口</p>
      <div class="flexrow"><input class="field en" id="type-input" placeholder="或打字(備用)" style="flex:1">
        <button class="btn small blue" onclick="sendTyped()">送出</button></div>
      <div style="height:10px"></div>
      ${talkState.hist.filter(m=>m.role==='me').length>=2?'<button class="btn small" onclick="endTalk()">結束交涉,結算 →</button>':''}
    </div>`;
  showScr('play');
  drawChat();
}
function drawChat(){
  $('talk-chat').innerHTML=talkState.hist.map(m=> m.role==='ai'
    ? `<div class="bub ai"><span class="en">${esc(m.text)}</span>
        <button class="speakbtn" style="width:28px;height:28px;font-size:13px" onclick="speak('${qesc(m.text)}')">🔊</button>
        ${m.hint?`<div class="hint">💡 ${esc(m.hint)}</div>`:''}</div>`
    : `<div class="bub me en">${esc(m.text)}</div>`).join('');
  window.scrollTo(0,document.body.scrollHeight);
}
let rec=null, recFinal='';
function micDown(ev){ ev.preventDefault();
  if(!SRX) return toast('此瀏覽器不支援語音,請用打字');
  speechSynthesis.cancel(); recFinal='';
  rec=new SRX(); rec.lang='en-US'; rec.interimResults=true; rec.continuous=true;
  rec.onresult=e=>{let t='';for(const r of e.results)t+=r[0].transcript; recFinal=t;};
  rec.onerror=e=>{ if(e.error==='not-allowed') toast('請允許麥克風權限'); };
  try{ rec.start(); $('mic').classList.add('rec'); $('mic-hint').textContent='聆聽中…放開送出'; }catch(_){}
}
function micUp(ev){ ev.preventDefault(); if(!rec) return;
  rec.onend=()=>{ $('mic')?.classList.remove('rec'); const t=recFinal.trim();
    if(t) sendTalk(t); else toast('沒聽清楚,再試一次'); };
  try{ rec.stop(); }catch(_){}
}
function sendTyped(){ const v=$('type-input').value.trim(); if(!v)return; $('type-input').value=''; sendTalk(v); }
async function sendTalk(text){
  talkState.hist.push({role:'me',text}); drawChat();
  const convo=talkState.hist.map(m=>(m.role==='ai'?'NPC: ':'Detective: ')+m.text).join('\n');
  const r=await withLoading('Old Joe 瞇起眼…',()=>gemini(
    `Conversation:\n${convo}\n\nContinue as the NPC. JSON: {"reply":"English line","hint":"繁中提示(25字內)"}`,
    {system:talkSystem(talkState.e)}));
  if(!r) return;
  talkState.hist.push({role:'ai',text:r.reply,hint:r.hint});
  renderTalk(); speak(r.reply);
}
async function endTalk(){
  const convo=talkState.hist.map(m=>(m.role==='ai'?'NPC: ':'Detective: ')+m.text).join('\n');
  const fb=await withLoading('整理筆記與回饋…',()=>gemini(
`你是台灣英文家教兼遊戲主持人。玩家(Detective)剛在偵探遊戲中用英文交涉,任務:「${talkState.e.mission}」。逐字稿:
"""${convo.slice(0,3000)}"""
回傳 JSON(繁中台灣用語):
{"success":true或false(玩家是否大致達成任務,寬鬆認定,有開口努力就傾向成功),
"info":"NPC 透露的劇情情報摘要(繁中,40字內,銜接『燈塔守失蹤』主線)",
"good":["玩家英文表現好的地方"](1-2),
"fix":["文法或用字修正:原句→正確說法→簡短說明"](1-3,沒錯就稱讚),
"better":["更道地的說法建議"](1-2),
"slang":{"phrase":"從對話情境延伸教一句道地英文口語/俚語","zh":"意思","example_en":"例句","example_zh":"翻譯"},
"cheer":"一句鼓勵"}`));
  if(!fb){ renderHub(); return; }
  const ok=!!fb.success;
  if(ok){ DB.prog.clues+=2; gainXP('talk',2); } else gainXP('talk',1);
  if(fb.slang && !DB.slang.find(s=>s.phrase===fb.slang.phrase)) DB.slang.push(fb.slang);
  save();
  const sec=(emo,t,arr)=>(arr&&arr.length)?`<div style="margin-top:10px"><b>${emo} ${t}</b>${arr.map(x=>`<div class="clue" style="border-style:solid">${esc(x)}</div>`).join('')}</div>`:'';
  $('scr-play').innerHTML=`${statusBar()}
    <div class="card"><span class="tag ${ok?'':'amber'}">${ok?'✓ 交涉成功 · 線索 +2':'✗ Joe 沒有全說,但你學到了東西'}</span>
      <p class="story" style="margin:10px 0 0">🗒 ${esc(fb.info||'')}</p></div>
    <div class="card"><b>📋 口說回饋</b>
      ${sec('👏','做得好',fb.good)}${sec('✏️','修正',fb.fix)}${sec('💬','更道地',fb.better)}
      ${fb.slang?`<div style="margin-top:10px"><b>🗣 順手學一句</b>
        <div class="minirow"><b class="en">${esc(fb.slang.phrase)}</b><span class="muted">${esc(fb.slang.zh)}</span>
        <button class="speakbtn" style="margin-left:auto" onclick="speak('${qesc(fb.slang.phrase)}')">🔊</button></div>
        <div class="muted en">${esc(fb.slang.example_en)}</div><div class="muted">${esc(fb.slang.example_zh)}</div></div>`:''}
      <div class="explain" style="margin-top:10px">💙 ${esc(fb.cheer||'')}</div></div>
    <button class="btn" onclick="advance()">前往下一站 →</button>`;
  showScr('play');
}

function epilogue(trueEnd, choice){
  const txt = choice===2
    ? '火舌捲走最後一個英文字母。霧,似乎淡了一點。但深夜的浪聲裡,你偶爾還是聽得見——有人在拼一個你沒學過的單字。'
    : trueEnd
      ? '日誌最後寫著:"The fog speaks. Learn its words, or be spoken." 周百川沒有失蹤——他走進霧裡,去「學它的語言」了。而現在,你的英文已經足以跟上他的腳步。第二章,海底傳來合唱。'
      : '字跡被海水暈開,你只拼湊出一半:"...the fog... learn... or be..." 你需要更多線索、更強的英文,才能讀懂全貌。';
  DB.prog.done=true; DB.prog.enc=ENC_TOTAL; save();
  $('scr-play').innerHTML=`
    <div class="card"><span class="tag amber">${trueEnd&&choice===1?'🌟 真結局':'結局'}</span>

  showScr('play');
}

/* ---- 夢魘(錯題 SRS) ---- */
let nmQueue=[], nmReturnToPlay=false;
function startNightmares(thenPlay){
  nmQueue=dueNightmares(); nmReturnToPlay=!!thenPlay;
  if(!nmQueue.length) return;
  nextNightmare();
}
function nextNightmare(){
  if(!nmQueue.length){
    $('scr-play').innerHTML=`<div class="card center"><div style="font-size:44px">🌅</div>
      <h3 class="serif">夢魘暫退</h3><p class="muted">已淨化 ${DB.gstats.purified} 個夢魘。</p>
      <button class="btn" onclick="${nmReturnToPlay?'playNext()':'renderHub()'}">${nmReturnToPlay?'繼續冒險 →':'回事務所'}</button></div>`;
    showScr('play'); return;
  }
  const nm=nmQueue[0];
  $('scr-play').innerHTML=`${statusBar()}
    <span class="tag" style="background:#3A2412;color:var(--bad)">😱 夢魘來襲 · 剩 ${nmQueue.length}</span>
    <div class="card"><p class="muted" style="margin:0 0 10px">這是你曾答錯的題目。答對,就能永遠淨化它。</p>
      <div id="q-box"></div></div>`;
  showScr('play');
  renderQuestion($('q-box'), nm, {kind:'nightmare', onDone:(ok)=>{
    const x=nmQueue.shift();
    if(ok){ DB.nightmares=DB.nightmares.filter(n=>n!==x); DB.gstats.purified++; gainXP('will',2);
      toast('✨ 夢魘淨化!'); }
    else{ x.fails++; x.next=Date.now()+SRS[0]*DAY; hurt('san'); }
    save(); nextNightmare();
  }});
}

  $('settings-overlay').classList.add('show');
}
function saveSettings(){
  const k=$('set-key').value.trim(); if(k) localStorage.setItem('fog_key',k);
  DB.settings.level=$('set-level').value; save();
  $('settings-overlay').classList.remove('show'); toast('已儲存 ✓');
}
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`霧港奇談存檔-${todayStr()}.json`; a.click(); URL.revokeObjectURL(a.href);
  toast('已下載存檔 ✓');
}
function importData(input){
  const f=input.files[0]; if(!f)return;
  const fr=new FileReader();
  fr.onload=()=>{ try{ const d=JSON.parse(fr.result);
      if(!Array.isArray(d.deck)) throw 0;
      DB=Object.assign(defaults(),d); save(); toast('匯入成功 ✓');
      $('settings-overlay').classList.remove('show');
      DB.player?renderHub():renderCharSelect();
    }catch(_){ toast('⚠️ 檔案格式不對'); } };
  fr.readAsText(f);
}
function resetAll(){
  if(!confirm('確定刪除全部進度?無法復原!'))return;
  localStorage.removeItem('fog_data'); localStorage.removeItem('fog_key'); location.reload();
}
function saveKey(){
  const k=$('key-input').value.trim();
  if(!k||!k.startsWith('AIza')) return toast('金鑰好像不對,應為 AIza 開頭');
  localStorage.setItem('fog_key',k);
  $('key-overlay').classList.remove('show'); toast('燈塔亮了 🔦');
  enterGame();
}

/* ================= 入口 ================= */
function enterGame(){
  if(!apiKey()){ $('key-overlay').classList.add('show'); return; }
  updateStreak(); refreshDust();
  if(!DB.player) renderCharSelect(); else { renderHub(); }
}
(function init(){
  if('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});
})();

</script>
</body>
</html>
