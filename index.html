<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>英語小日子 · Daily English</title>
<meta name="description" content="個人化英文學習:單字、文法、影集對白、口說練習">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FAF7F1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="英語小日子">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
:root{
  --bg:#FAF7F1; --card:#FFFFFF; --ink:#23262E; --ink2:#6B7280;
  --line:#ECE7DD;
  --blue:#2F6BFF; --blue-deep:#1E4FD8; --blue-soft:#EAF0FF; --blue-ink:#1B3FA8;
  --amber:#E8890C; --amber-soft:#FFF3E0; --amber-ink:#9A5B00;
  --ok:#2F6BFF; --ok-soft:#EAF0FF;       /* 正確 = 藍 + ✓(色弱友善) */
  --bad:#D9670D; --bad-soft:#FFF0DE;      /* 錯誤 = 橘 + ✗(色弱友善) */
  --r:22px; --shadow:0 10px 30px rgba(35,38,46,.07), 0 2px 6px rgba(35,38,46,.05);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",Inter,sans-serif;
  font-size:16px; line-height:1.65; -webkit-font-smoothing:antialiased}
body{padding-bottom:110px; max-width:560px; margin:0 auto; min-height:100dvh}
button{font-family:inherit; border:none; cursor:pointer; background:none; color:inherit}
input,textarea,select{font-family:inherit; font-size:16px; color:var(--ink)}
h1,h2,h3{margin:0; font-weight:800}
.en{font-family:Inter,-apple-system,"SF Pro Text",Roboto,sans-serif}

/* ---------- 版面 ---------- */
.view{display:none; padding:max(14px,env(safe-area-inset-top)) 18px 8px; animation:fadein .25s ease}
.view.active{display:block}
@keyframes fadein{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}

.topbar{display:flex; align-items:center; justify-content:space-between; margin:6px 0 14px}
.topbar h2{font-size:22px}
.iconbtn{width:42px; height:42px; border-radius:14px; background:var(--card); box-shadow:var(--shadow);
  display:flex; align-items:center; justify-content:center; font-size:19px}

.card{background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); padding:18px; margin-bottom:14px}
.card.soft{background:var(--blue-soft); box-shadow:none}
.muted{color:var(--ink2); font-size:13.5px}
.tag{display:inline-block; padding:3px 10px; border-radius:999px; font-size:12.5px; font-weight:700;
  background:var(--blue-soft); color:var(--blue-ink)}
.tag.amber{background:var(--amber-soft); color:var(--amber-ink)}

/* ---------- 按鈕 ---------- */
.btn{display:flex; width:100%; align-items:center; justify-content:center; gap:8px;
  padding:15px 18px; border-radius:18px; font-size:16.5px; font-weight:800;
  background:var(--blue); color:#fff; box-shadow:0 6px 18px rgba(47,107,255,.32);
  transition:transform .1s ease}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--card); color:var(--blue-ink); box-shadow:var(--shadow)}
.btn.amber{background:var(--amber); box-shadow:0 6px 18px rgba(232,137,12,.3)}
.btn.small{width:auto; padding:9px 16px; font-size:14px; border-radius:13px}
.btn[disabled]{opacity:.45; pointer-events:none}
.chip{display:inline-flex; align-items:center; gap:6px; padding:9px 15px; margin:0 8px 8px 0;
  border-radius:999px; background:var(--card); box-shadow:var(--shadow); font-size:14.5px; font-weight:700}
.chip.on{background:var(--blue); color:#fff}

/* ---------- 首頁 ---------- */
.hero{background:linear-gradient(135deg,#2F6BFF 0%,#5B8CFF 60%,#7FA6FF 100%);
  border-radius:26px; padding:22px 20px; color:#fff; margin-bottom:16px;
  box-shadow:0 14px 34px rgba(47,107,255,.35)}
.hero .hi{font-size:13px; opacity:.85; font-weight:700; letter-spacing:.4px}
.hero h1{font-size:25px; margin:4px 0 14px}
.hero .stats{display:flex; gap:10px}
.hero .stat{flex:1; background:rgba(255,255,255,.16); border-radius:16px; padding:10px 12px; backdrop-filter:blur(4px)}
.hero .stat b{display:block; font-size:21px; line-height:1.2}
.hero .stat span{font-size:12px; opacity:.9}
.modules{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px}
.module{background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); padding:16px 15px; text-align:left}
.module .emo{font-size:27px; display:block; margin-bottom:6px}
.module b{font-size:16px}
.module p{margin:3px 0 0; font-size:12.5px; color:var(--ink2); line-height:1.45}
.duebar{display:flex; align-items:center; gap:12px}
.duebar .n{font-size:30px; font-weight:800; color:var(--blue-ink); min-width:46px; text-align:center}

/* ---------- 底部導覽 ---------- */
nav{position:fixed; left:50%; transform:translateX(-50%); bottom:max(14px,env(safe-area-inset-bottom));
  width:min(540px,calc(100% - 24px)); background:rgba(255,255,255,.92); backdrop-filter:blur(14px);
  border-radius:26px; box-shadow:0 12px 36px rgba(35,38,46,.16); display:flex; padding:8px; z-index:50}
nav button{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:8px 0 6px; border-radius:18px; font-size:11px; font-weight:700; color:var(--ink2)}
nav button .emo{font-size:21px; line-height:1}
nav button.on{background:var(--blue-soft); color:var(--blue-ink)}

/* ---------- 表單 ---------- */
.field{width:100%; padding:14px 16px; border-radius:16px; border:1.5px solid var(--line);
  background:var(--card); outline:none; transition:border .15s}
.field:focus{border-color:var(--blue)}
textarea.field{min-height:120px; resize:vertical; line-height:1.6}
.searchrow{display:flex; gap:10px}
.searchrow .field{flex:1}
.searchrow .btn{width:auto; padding:0 20px}

/* ---------- 單字卡 ---------- */
.wordhead{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.wordhead .w{font-size:30px; font-weight:800}
.kk{color:var(--ink2); font-size:15px}
.speakbtn{width:38px; height:38px; border-radius:12px; background:var(--blue-soft); color:var(--blue-ink);
  font-size:17px; display:inline-flex; align-items:center; justify-content:center; flex:none}
.sec{margin-top:14px}
.sec h4{margin:0 0 7px; font-size:13.5px; color:var(--blue-ink); letter-spacing:.5px}
.exrow{padding:11px 13px; background:var(--bg); border-radius:14px; margin-bottom:8px}
.exrow .e{font-weight:600}
.exrow .z{font-size:13.5px; color:var(--ink2)}
.minirow{display:flex; align-items:flex-start; gap:8px; padding:9px 0; border-bottom:1px dashed var(--line)}
.minirow:last-child{border-bottom:none}
.minirow b{flex:none}
.addw{margin-left:auto; flex:none; width:30px; height:30px; border-radius:10px; background:var(--amber-soft);
  color:var(--amber-ink); font-size:17px; font-weight:800}

/* ---------- 測驗 ---------- */
.opt{display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:14px 16px;
  border-radius:16px; background:var(--card); box-shadow:var(--shadow); margin-bottom:10px;
  font-size:16px; font-weight:600; border:2px solid transparent}
.opt .mk{flex:none; width:26px; height:26px; border-radius:9px; background:var(--bg);
  display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800}
.opt.correct{border-color:var(--ok); background:var(--ok-soft)}
.opt.correct .mk{background:var(--ok); color:#fff}
.opt.wrong{border-color:var(--bad); background:var(--bad-soft)}
.opt.wrong .mk{background:var(--bad); color:#fff}
.explain{border-left:4px solid var(--amber); background:var(--amber-soft); border-radius:0 14px 14px 0;
  padding:12px 14px; font-size:14.5px; margin:6px 0 12px}
.progress{height:8px; background:var(--line); border-radius:99px; overflow:hidden; margin:4px 0 16px}
.progress i{display:block; height:100%; background:var(--blue); border-radius:99px; transition:width .3s}
.bigscore{text-align:center; padding:10px 0}
.bigscore b{font-size:54px; color:var(--blue-ink)}

/* ---------- 對話 ---------- */
.chat{display:flex; flex-direction:column; gap:10px; margin-bottom:14px}
.bub{max-width:82%; padding:11px 15px; border-radius:19px; box-shadow:var(--shadow); position:relative}
.bub.ai{background:var(--card); border-bottom-left-radius:7px; align-self:flex-start}
.bub.me{background:var(--blue); color:#fff; border-bottom-right-radius:7px; align-self:flex-end}
.bub .hint{margin-top:6px; font-size:12.5px; color:var(--amber-ink); background:var(--amber-soft);
  padding:5px 9px; border-radius:9px}
.micbtn{width:84px; height:84px; border-radius:50%; background:var(--blue); color:#fff; font-size:32px;
  box-shadow:0 10px 26px rgba(47,107,255,.4); display:flex; align-items:center; justify-content:center;
  margin:0 auto; transition:transform .12s}
.micbtn.rec{background:var(--amber); transform:scale(1.12); box-shadow:0 10px 26px rgba(232,137,12,.45)}
.center{text-align:center}
.flexrow{display:flex; gap:10px; align-items:center}
.spacer{flex:1}

/* ---------- 切換開關 ---------- */
.seg{display:flex; background:var(--line); border-radius:15px; padding:4px; margin-bottom:14px}
.seg button{flex:1; padding:9px; border-radius:12px; font-weight:800; font-size:14px; color:var(--ink2)}
.seg button.on{background:var(--card); color:var(--blue-ink); box-shadow:var(--shadow)}

/* ---------- 彈窗 / 載入 ---------- */
.overlay{position:fixed; inset:0; background:rgba(35,38,46,.45); z-index:90; display:none;
  align-items:flex-end; justify-content:center; backdrop-filter:blur(3px)}
.overlay.show{display:flex}
.sheet{background:var(--card); width:min(560px,100%); border-radius:26px 26px 0 0; padding:24px 20px;
  padding-bottom:max(24px,env(safe-area-inset-bottom)); max-height:88dvh; overflow:auto; animation:up .26s ease}
@keyframes up{from{transform:translateY(40px); opacity:0}to{transform:none; opacity:1}}
#loading{position:fixed; inset:0; z-index:99; background:rgba(250,247,241,.86); display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:14px; backdrop-filter:blur(2px)}
#loading.show{display:flex}
.spin{width:46px; height:46px; border-radius:50%; border:5px solid var(--blue-soft);
  border-top-color:var(--blue); animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#toast{position:fixed; left:50%; transform:translateX(-50%); bottom:120px; z-index:98;
  background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:14px;
  font-weight:700; opacity:0; pointer-events:none; transition:opacity .25s; max-width:86%; text-align:center}
#toast.show{opacity:1}
.divider{height:1px; background:var(--line); margin:14px 0}
a{color:var(--blue-ink)}
.empty{text-align:center; padding:34px 10px; color:var(--ink2)}
.empty .emo{font-size:42px; display:block; margin-bottom:8px}
</style>
</head>
<body>

<!-- ===== 首頁 ===== -->
<section class="view active" id="view-home">
  <div class="topbar">
    <h2>英語小日子</h2>
    <button class="iconbtn" onclick="openSettings()" aria-label="設定">⚙️</button>
  </div>
  <div class="hero">
    <div class="hi" id="greet">HELLO</div>
    <h1 id="greet2">今天也來學一點吧!</h1>
    <div class="stats">
      <div class="stat"><b id="st-streak">0</b><span>🔥 連續天數</span></div>
      <div class="stat"><b id="st-words">0</b><span>📚 已學單字</span></div>
      <div class="stat"><b id="st-acc">–</b><span>🎯 文法答對率</span></div>
    </div>
  </div>

  <div class="card" id="due-card">
    <div class="duebar">
      <div class="n" id="due-n">0</div>
      <div style="flex:1">
        <b>今天要複習的單字</b>
        <div class="muted" id="due-sub">按照間隔複習,記得更牢!</div>
      </div>
      <button class="btn small" onclick="startReview()">開始</button>
    </div>
    <div class="divider"></div>
    <div class="duebar">
      <div class="n" id="wrong-n" style="color:var(--amber-ink)">0</div>
      <div style="flex:1">
        <b>錯題本待複習</b>
        <div class="muted">把不熟的文法觀念補起來</div>
      </div>
      <button class="btn small amber" onclick="goErrbook()">去看看</button>
    </div>

    <button class="module" onclick="showView('vocab')"><span class="emo">📖</span><b>單字學習</b><p>查單字、建立單字庫</p></button>
    <button class="module" onclick="showView('grammar')"><span class="emo">✏️</span><b>文法練習</b><p>AI 出題、詳細解析</p></button>
    <button class="module" onclick="showView('drama')"><span class="emo">🎬</span><b>影集對白</b><p>逐句拆解道地說法</p></button>
    <button class="module" onclick="showView('speak')"><span class="emo">🎙️</span><b>口說練習</b><p>情境對話、AI 回饋</p></button>
  </div>
</section>

<!-- ===== 單字 ===== -->
<section class="view" id="view-vocab">
  <div class="topbar"><h2>📖 單字學習</h2><button class="iconbtn" onclick="showView('home')" aria-label="回首頁">🏠</button></div>
  <div class="seg">

  <div id="vocab-lookup">

      <input class="field en" id="word-input" placeholder="輸入英文單字,例如 weather" autocomplete="off" autocapitalize="off">
      <button class="btn" onclick="lookupWord()">查詢</button>
    </div>
    <div id="word-result" style="margin-top:14px"></div>
  </div>
  <div id="vocab-lib" style="display:none"></div>
</section>

<!-- ===== 文法 ===== -->
<section class="view" id="view-grammar">
  <div class="topbar"><h2>✏️ 文法練習</h2><button class="iconbtn" onclick="showView('home')" aria-label="回首頁">🏠</button></div>
  <div id="grammar-body"></div>
</section>

<!-- ===== 對白 ===== -->
<section class="view" id="view-drama">
  <div class="topbar"><h2>🎬 影集對白學習</h2><button class="iconbtn" onclick="showView('home')" aria-label="回首頁">🏠</button></div>
  <div id="drama-body"></div>
</section>

<!-- ===== 口說 ===== -->
<section class="view" id="view-speak">
  <div class="topbar"><h2>🎙️ 口說練習</h2><button class="iconbtn" onclick="showView('home')" aria-label="回首頁">🏠</button></div>
  <div id="speak-body"></div>
</section>

<!-- 底部導覽 -->
<nav id="tabbar">
  <button data-v="home" class="on"><span class="emo">🏠</span>首頁</button>
  <button data-v="vocab"><span class="emo">📖</span>單字</button>
  <button data-v="grammar"><span class="emo">✏️</span>文法</button>
  <button data-v="drama"><span class="emo">🎬</span>對白</button>
  <button data-v="speak"><span class="emo">🎙️</span>口說</button>
</nav>

<!-- API Key 引導 -->
<div class="overlay" id="key-overlay">
  <div class="sheet">
    <h3 style="font-size:20px">🔑 第一次使用,先設定 AI 金鑰</h3>
    <p class="muted" style="margin:10px 0 4px">這個 app 使用 Google Gemini AI。金鑰只會存在<b>你自己的手機</b>裡,不會上傳到任何地方。</p>
    <ol style="font-size:14px; color:var(--ink2); padding-left:20px; margin:8px 0 14px; line-height:1.9">
      <li>打開 <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>(免費)</li>
      <li>用 Google 帳號登入 → 點「Create API key」</li>
      <li>複製金鑰,貼到下面的框框</li>
    </ol>
    <input class="field en" id="key-input" placeholder="貼上你的 API key(AIza 開頭)" autocomplete="off">
    <div style="height:12px"></div>
    <button class="btn" onclick="saveKey()">儲存,開始學習 🚀</button>
  </div>
</div>

<!-- 設定 -->
<div class="overlay" id="settings-overlay" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="sheet" id="settings-sheet"></div>
</div>

<!-- 載入 / 提示 -->
<div id="loading"><div class="spin"></div><div id="loading-text" class="muted" style="font-weight:700">AI 思考中…</div></div>
<div id="toast"></div>

<script>
/* ================= 基礎:資料儲存 ================= */
const DAY = 86400000;
const SRS_INTERVALS = [1, 3, 7, 14]; // 天
function defaults(){ return {
  words: [],            // {word, zh, data, addedAt, srs:{level,next}}
  wrong: [],            // {q, options, answer, explain, topic, ts}
  stats: {lookups:0, grammarTotal:0, grammarCorrect:0, sessions:0, speakSessions:0},
  streak: {last:'', count:0},
  daily: null,          // {date, pack}
  settings: {level:'國小三、四年級', textModel:'gemini-2.5-flash',
             liveModel:'gemini-2.5-flash-native-audio-preview-09-2025'}
};}
let DB = defaults();
try{ const raw = localStorage.getItem('ela_data'); if(raw) DB = Object.assign(defaults(), JSON.parse(raw)); }catch(e){}
function save(){ localStorage.setItem('ela_data', JSON.stringify(DB)); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function $(id){ return document.getElementById(id); }

/* ================= 提示與載入 ================= */
let toastTimer;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'), 2600); }
function loading(on, text){ $('loading-text').textContent = text||'AI 思考中…';
  $('loading').classList.toggle('show', !!on); }
async function withLoading(text, fn){
  loading(true, text);
  try{ return await fn(); }
  catch(e){
    console.error(e);
    if(String(e.message).includes('NO_KEY')) { $('key-overlay').classList.add('show'); }
    else if(String(e.message).includes('API 400') && String(e.message).includes('API key')) toast('⚠️ API 金鑰無效,請到設定重新輸入');
    else if(String(e.message).includes('API 429')) toast('⚠️ 今天的免費額度用完了,明天再來或稍後重試');
    else if(!navigator.onLine) toast('⚠️ 沒有網路連線,AI 功能需要上網');
    else toast('⚠️ 出了點問題:' + String(e.message).slice(0,80));
    return null;
  } finally{ loading(false); }
}

/* ================= Gemini API ================= */
function apiKey(){ return localStorage.getItem('ela_key') || ''; }
async function gemini(prompt, opts={}){
  const key = apiKey(); if(!key) throw new Error('NO_KEY');
  const model = opts.model || DB.settings.textModel || 'gemini-2.5-flash';
  const body = { contents: [{role:'user', parts:[{text: prompt}]}] };
  if(opts.system) body.systemInstruction = {parts:[{text: opts.system}]};
  body.generationConfig = {};
  if(opts.json !== false) body.generationConfig.responseMimeType = 'application/json';
  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
    {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  if(!r.ok){ const t = await r.text(); throw new Error('API '+r.status+' '+t.slice(0,300)); }
  const d = await r.json();
  let text = (d.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
  if(opts.json !== false){
    text = text.replace(/^```json\s*/i,'').replace(/```\s*$/,'').trim();
    return JSON.parse(text);
  }
  return text;
}

/* ================= 朗讀 / 語音輸入 ================= */
let voicesReady = [];
function loadVoices(){ voicesReady = speechSynthesis.getVoices(); }
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
function speak(text, rate){
  if(!('speechSynthesis' in window)) return toast('此瀏覽器不支援朗讀');
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate || 0.92;
  const v = voicesReady.find(v=>/en[-_]US/i.test(v.lang)) || voicesReady.find(v=>/^en/i.test(v.lang));
  if(v) u.voice = v;
  speechSynthesis.speak(u);
}
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

/* ================= 導覽 ================= */
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $('view-'+name).classList.add('active');

async function lookupWord(givenWord){
  const w = (givenWord || $('word-input').value).trim();
  if(!w) return toast('先輸入一個英文單字吧');
  const data = await withLoading(`查詢 ${w} 中…`, ()=>gemini(
`你是台灣的英文老師,為程度「${DB.settings.level}」的學生詳細解說單字「${w}」。
回傳 JSON(說明全用繁體中文台灣用語):
{"word":"${w}","kk":"KK音標,如 [ˋwɛðɚ]",
"meanings":[{"pos":"詞性如 n. / v. / adj.","zh":"中文意思"}],
"examples":[{"en":"例句","zh":"翻譯","level":"基礎|進階|挑戰"}] (恰好3句,由淺入深),
"usage":"用法說明:常見搭配、介系詞、片語(80字內)",
"synonyms":[{"word":"同義詞","diff":"和原字的差異(20字內)"}] (2-3個),
"confusable":[{"word":"易混淆字","diff":"差在哪(20字內)"}] (1-2個)}`));
  if(!data) return;
  DB.stats.lookups++;

  $('word-result').innerHTML = wordCard(data, true);

}
function saveWordToLib(data){
  const key = data.word.toLowerCase();
  let item = DB.words.find(x=>x.word.toLowerCase()===key);
  if(item){ item.data = data; item.zh = data.meanings?.[0]?.zh || item.zh; }
  else DB.words.push({word:data.word, zh:data.meanings?.[0]?.zh||'', data, addedAt:Date.now(),
                      srs:{level:0, next: Date.now()+SRS_INTERVALS[0]*DAY}});
  save();
}
function addWordQuick(word, zh, btn){
  const key = word.toLowerCase();
  if(!DB.words.find(x=>x.word.toLowerCase()===key)){
    DB.words.push({word, zh, data:null, addedAt:Date.now(), srs:{level:0, next:Date.now()+SRS_INTERVALS[0]*DAY}});
    save(); toast(`已加入單字庫:${word} ✓`);
  } else toast('這個字已經在單字庫囉');
  if(btn){ btn.textContent='✓'; btn.disabled=true; }
}

      <div class="exrow"><span class="tag">${esc(e.level||'')}</span>

function revBtns(){ return `<div class="flexrow">

function gradeReview(ok){

const GRAMMAR_TOPICS = ['現在式','過去式','未來式','be 動詞','助動詞','介系詞','冠詞','可數/不可數','比較級','綜合測驗'];
let grammarState = {active:false, qs:[], i:0, correct:0, topic:'', fromErrbook:false};
function renderGrammarSetup(){
  grammarState.active = false;
  $('grammar-body').innerHTML = `
    <div class="card">
      <h4 style="margin:0 0 10px;color:var(--blue-ink)">選一個主題</h4>
      <div id="g-topics">${GRAMMAR_TOPICS.map((t,i)=>`<button class="chip ${i===9?'on':''}" data-t="${t}" onclick="pickTopic(this)">${t}</button>`).join('')}</div>

          ${['國小三、四年級','國小五、六年級','國中入門'].map(l=>`<option ${DB.settings.level===l?'selected':''}>${l}</option>`).join('')}
        </select></div>
      <div style="height:14px"></div>
      <button class="btn" onclick="startGrammar()">開始練習(5 題)🚀</button>
    </div>
    ${DB.wrong.length?`<button class="btn ghost" onclick="goErrbook()">📕 複習錯題本(${DB.wrong.length} 題)</button>`:''}
    ${DB.stats.sessions?`<p class="muted center" style="margin-top:12px">累計練習 ${DB.stats.sessions} 回 · 整體答對率 ${Math.round(DB.stats.grammarCorrect/DB.stats.grammarTotal*100)}%</p>`:''}`;
}
function pickTopic(btn){ document.querySelectorAll('#g-topics .chip').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); }
async function startGrammar(){
  const topic = document.querySelector('#g-topics .chip.on')?.dataset.t || '綜合測驗';
  DB.settings.level = $('g-level').value; save();
  const qs = await withLoading('AI 出題中…', ()=>gemini(
`你是台灣的英文老師,為程度「${DB.settings.level}」的學生出 5 題英文文法選擇題,主題:「${topic}」。
題目要有變化(選擇與克漏字混合,克漏字用 ____ 表示空格)。
回傳 JSON 陣列:[{"q":"題目(英文句子,可含簡短中文情境提示)","options":["A","B","C","D"](4個英文選項),"answer":0(正確選項的索引0-3),"explain":"用繁體中文詳細解釋文法觀念:為什麼這個對、其他為什麼錯(100字內,親切口吻)"}]`));
  if(!qs || !Array.isArray(qs)) return;
  grammarState = {active:true, qs, i:0, correct:0, topic, fromErrbook:false};
  renderQuestion();
}
function renderQuestion(){
  const s = grammarState, q = s.qs[s.i];
  $('grammar-body').innerHTML = `
    <div class="flexrow"><span class="tag">${esc(s.topic)}</span><span class="spacer"></span>
      <span class="muted">第 ${s.i+1} / ${s.qs.length} 題</span></div>
    <div class="progress"><i style="width:${(s.i)/s.qs.length*100}%"></i></div>
    <div class="card"><div class="en" style="font-size:18px;font-weight:700;line-height:1.7">${esc(q.q)}</div></div>
    <div id="opts">${q.options.map((o,i)=>`
      <button class="opt" onclick="answer(${i})"><span class="mk">${'ABCD'[i]}</span><span class="en">${esc(o)}</span></button>`).join('')}
    </div>
    <div id="after"></div>`;
}
function answer(pick){
  const s = grammarState, q = s.qs[s.i];
  const ok = pick === q.answer;
  document.querySelectorAll('#opts .opt').forEach((b,i)=>{
    b.disabled = true;
    if(i===q.answer){ b.classList.add('correct'); b.querySelector('.mk').textContent='✓'; }
    if(i===pick && !ok){ b.classList.add('wrong'); b.querySelector('.mk').textContent='✗'; }
  });
  if(ok) s.correct++;
  DB.stats.grammarTotal++; if(ok) DB.stats.grammarCorrect++;
  if(!ok && !s.fromErrbook){
    DB.wrong.push({q:q.q, options:q.options, answer:q.answer, explain:q.explain, topic:s.topic, ts:Date.now()});
  }
  if(ok && s.fromErrbook && q._wrongIdx!==undefined){ s.removeIdx.push(q._wrongIdx); }
  save();
  $('after').innerHTML = `
    <div class="explain"><b>${ok?'✓ 答對了!':'✗ 答錯囉,看看為什麼:'}</b><br>${esc(q.explain)}</div>
    <button class="btn" onclick="nextQuestion()">${s.i+1<s.qs.length?'下一題 →':'看成績 🏁'}</button>`;
}
function nextQuestion(){
  const s = grammarState;
  s.i++;
  if(s.i < s.qs.length) return renderQuestion();
  // 結算
  if(s.fromErrbook && s.removeIdx?.length){
    DB.wrong = DB.wrong.filter((_,i)=>!s.removeIdx.includes(i)); save();
  }
  if(!s.fromErrbook){ DB.stats.sessions++; save(); }
  const pct = Math.round(s.correct/s.qs.length*100);
  const msg = pct===100?'太強了,全對!🏆':pct>=80?'很棒,繼續保持!👏':pct>=60?'不錯喔,錯的觀念再看一下 💪':'沒關係,錯題本會幫你複習 📕';
  $('grammar-body').innerHTML = `
    <div class="card bigscore"><div class="muted">本回答對率</div><b>${pct}%</b>
      <div style="font-size:17px;font-weight:700;margin-top:4px">${s.correct} / ${s.qs.length} 題 · ${msg}</div></div>
    ${DB.wrong.length?`<button class="btn amber" onclick="goErrbook()">📕 去錯題本複習(${DB.wrong.length} 題)</button><div style="height:10px"></div>`:''}
    <button class="btn" onclick="renderGrammarSetup()">再練一回 🔁</button>
    <div style="height:10px"></div>
    <button class="btn ghost" onclick="showView('home')">回首頁</button>`;
  grammarState.active = false;
  renderHome();
}
function goErrbook(){
  showView('grammar');
  if(!DB.wrong.length){ renderGrammarSetup(); return toast('錯題本是空的,太棒了!'); }
  $('grammar-body').innerHTML = `
    <div class="card"><b>📕 錯題本(${DB.wrong.length} 題)</b>
      <p class="muted" style="margin:6px 0 0">重練時答對的題目會自動從錯題本移除。</p></div>
    ${DB.wrong.slice(0,30).map(w=>`<div class="card" style="padding:14px 16px">
      <span class="tag amber">${esc(w.topic)}</span>
      <div class="en" style="font-weight:700;margin-top:6px">${esc(w.q)}</div>
      <div class="muted" style="margin-top:4px;font-size:13px">答案:${esc(w.options[w.answer])}</div></div>`).join('')}
    <button class="btn amber" onclick="retryWrong()">🔁 重練錯題(最多 5 題)</button>
    <div style="height:10px"></div>
    <button class="btn ghost" onclick="renderGrammarSetup()">← 回文法練習</button>`;
  grammarState.active = true;
}
function retryWrong(){
  const picks = DB.wrong.map((w,i)=>({...w, _wrongIdx:i})).slice(0,5);
  grammarState = {active:true, qs:picks, i:0, correct:0, topic:'錯題複習', fromErrbook:true, removeIdx:[]};
  renderQuestion();
}

      ${(l.phrases||[]).map(p=>`<div class="minirow"><b class="en">${esc(p.p)}</b><span class="muted">${esc(p.zh)}</span>
        <button class="addw" onclick="addWordQuick('${esc(p.p).replace(/'/g,"\\'")}','${esc(p.zh).replace(/'/g,"\\'")}',this)">＋</button></div>`).join('')}
      ${l.colloquial?`<div class="explain" style="margin-top:8px">🗣 ${esc(l.colloquial)}</div>`:''}
      ${l.culture?`<div class="explain" style="margin-top:8px;border-color:var(--blue);background:var(--blue-soft)">🌏 ${esc(l.culture)}</div>`:''}
    </div>`).join('')}
    <div class="card"><b>✍️ 模仿造句練習</b>
      ${(data.practice||[]).map(p=>`<div class="exrow" style="margin-top:10px"><div>${esc(p.task)}</div>
        <div class="z en" style="margin-top:4px">示範:${esc(p.sample)}</div></div>`).join('')}

}

/* ================= 口說模組 ================= */
const SCENARIOS = [
  {id:'order', emo:'🍔', name:'餐廳點餐', en:'ordering food at a restaurant'},
  {id:'intro', emo:'👋', name:'自我介紹', en:'introducing yourself to a new friend'},
  {id:'way',   emo:'🗺️', name:'問路',     en:'asking for directions in a city'},
  {id:'shop',  emo:'🛍️', name:'購物',     en:'shopping for clothes in a store'},
  {id:'doc',   emo:'🏥', name:'看醫生',   en:'visiting a doctor with a cold'},
];
let speakState = {active:false, mode:'simple', scenario:null, history:[], live:null, transcript:[]};
function renderSpeakSetup(){
  speakState = {active:false, mode:speakState.mode||'simple', scenario:null, history:[], live:null, transcript:[]};
  $('speak-body').innerHTML = `
    <div class="seg">
      <button id="sm-simple" class="${speakState.mode==='simple'?'on':''}" onclick="setSpeakMode('simple')">🎤 簡易模式(穩定)</button>
      <button id="sm-live" class="${speakState.mode==='live'?'on':''}" onclick="setSpeakMode('live')">⚡ 即時對話(Live)</button>
    </div>
    <p class="muted" id="sm-desc" style="margin:0 0 12px"></p>
    <div class="card"><b>選一個情境開始</b>
      <div style="margin-top:12px">${SCENARIOS.map(s=>`
        <button class="chip" onclick="startSpeak('${s.id}')">${s.emo} ${s.name}</button>`).join('')}</div>
    </div>`;
  setSpeakMode(speakState.mode);
}
function setSpeakMode(m){
  speakState.mode = m;
  $('sm-simple')?.classList.toggle('on', m==='simple');
  $('sm-live')?.classList.toggle('on', m==='live');
  const d = $('sm-desc');
  if(d) d.textContent = m==='simple'
    ? '按住麥克風講英文 → AI 回覆並朗讀。最穩定,所有手機都能用。'
    : '像打電話一樣即時語音對話(Gemini Live)。較吃網路,若連不上請改用簡易模式。';
}
function startSpeak(id){
  const sc = SCENARIOS.find(s=>s.id===id);
  speakState.scenario = sc; speakState.active = true;
  speakState.history = []; speakState.transcript = [];
  if(speakState.mode === 'live') startLive(sc); else startSimple(sc);
}
/* ---- 簡易模式 ---- */
function speakSystemPrompt(sc){
  return `You are a friendly English conversation partner for a Taiwanese learner at elementary school level (grade 3-4). Role-play scenario: ${sc.en}. You start and lead the conversation. Use VERY simple English (short sentences, basic words). One or two sentences per turn. Be warm and encouraging.`;
}
function renderSimpleUI(){
  const sc = speakState.scenario;
  $('speak-body').innerHTML = `
    <div class="flexrow" style="margin-bottom:12px"><span class="tag">${sc.emo} ${sc.name} · 簡易模式</span>
      <span class="spacer"></span><button class="btn small amber" onclick="endSimple()">結束並看回饋</button></div>
    <div class="chat" id="chat"></div>
    <div class="center" style="margin:18px 0 6px">
      <button class="micbtn" id="mic"
        ontouchstart="micDown(event)" ontouchend="micUp(event)"
        onmousedown="micDown(event)" onmouseup="micUp(event)">🎤</button>
      <p class="muted" style="margin-top:10px" id="mic-hint">按住說英文,放開送出</p>
      <div class="flexrow" style="margin-top:8px">
        <input class="field en" id="type-input" placeholder="或用打字的(備用)" style="flex:1">
        <button class="btn small" onclick="sendTyped()">送出</button></div>
    </div>`;
  renderChat();
}
function renderChat(){
  $('chat').innerHTML = speakState.history.map(m=>
    m.role==='ai'
    ? `<div class="bub ai"><span class="en">${esc(m.text)}</span>
        <button class="speakbtn" style="width:30px;height:30px;font-size:14px" onclick="speak('${esc(m.text).replace(/'/g,"\\'")}')">🔊</button>
        ${m.hint?`<div class="hint">💡 ${esc(m.hint)}</div>`:''}</div>`
    : `<div class="bub me en">${esc(m.text)}</div>`).join('');
  window.scrollTo(0, document.body.scrollHeight);
}
async function startSimple(sc){
  renderSimpleUI();
  const r = await withLoading('AI 夥伴準備中…', ()=>gemini(
    `Start the conversation now. Reply JSON: {"reply":"your opening line in simple English","hint":"給學生的中文小提示:可以怎麼回(20字內,繁體中文)"}`,
    {system: speakSystemPrompt(sc)}));
  if(!r){ renderSpeakSetup(); return; }
  speakState.history.push({role:'ai', text:r.reply, hint:r.hint});
  renderChat(); speak(r.reply);
}
let rec = null, recFinal = '';
function micDown(e){
  e.preventDefault();
  if(!SR){ toast('此瀏覽器不支援語音輸入,請用下方打字'); return; }
  speechSynthesis.cancel();
  recFinal = '';
  rec = new SR(); rec.lang = 'en-US'; rec.interimResults = true; rec.continuous = true;
  rec.onresult = ev=>{ let t=''; for(const r of ev.results) t += r[0].transcript; recFinal = t; };
  rec.onerror = ev=>{ if(ev.error==='not-allowed') toast('請允許麥克風權限'); };
  try{ rec.start(); $('mic').classList.add('rec'); $('mic-hint').textContent='聆聽中…放開送出'; }catch(_){}
}
function micUp(e){
  e.preventDefault();
  if(!rec) return;
  rec.onend = ()=>{
    $('mic').classList.remove('rec'); $('mic-hint').textContent='按住說英文,放開送出';
    const t = recFinal.trim();
    if(t) sendUserText(t); else toast('沒有聽清楚,再試一次');
  };
  try{ rec.stop(); }catch(_){ }
}
function sendTyped(){
  const v = $('type-input').value.trim();
  if(!v) return; $('type-input').value='';
  sendUserText(v);
}
async function sendUserText(text){
  speakState.history.push({role:'me', text});
  renderChat();
  const convo = speakState.history.map(m=>(m.role==='ai'?'AI: ':'Student: ')+m.text).join('\n');
  const r = await withLoading('AI 回覆中…', ()=>gemini(
    `Conversation so far:\n${convo}\n\nContinue as the AI. Reply JSON: {"reply":"next line, simple English","hint":"中文小提示(20字內)"}`,
    {system: speakSystemPrompt(speakState.scenario)}));
  if(!r) return;
  speakState.history.push({role:'ai', text:r.reply, hint:r.hint});
  renderChat(); speak(r.reply);
}
async function endSimple(){
  const mine = speakState.history.filter(m=>m.role==='me');
  if(!mine.length){ renderSpeakSetup(); return; }
  await showFeedback(speakState.history.map(m=>(m.role==='ai'?'AI: ':'Student: ')+m.text).join('\n'), false);
}
async function showFeedback(transcript, isLive){
  const fb = await withLoading('整理學習回饋中…', ()=>gemini(
`你是台灣的英文家教。以下是程度「${DB.settings.level}」學生的口說練習逐字稿(Student 是學生說的):
"""${transcript.slice(0,3000)}"""
請給溫暖具體的回饋,回傳 JSON(繁體中文台灣用語):
{"good":["學生做得好的地方"](1-2點),
"grammar":["文法修正:指出原句→正確說法→簡短說明"](1-3點,沒錯就稱讚),
"better":["更道地的用詞或句型建議"](1-2點),
"pron":["發音建議:根據用字推測學生可能唸不準的音,給中文提示"](1-2點),
"cheer":"一句鼓勵的話"}`));
  speakState.active = false;
  DB.stats.speakSessions++; save();
  if(!fb){ renderSpeakSetup(); return; }
  const sec = (emo,title,arr)=> (arr&&arr.length)?`<div class="sec"><h4>${emo} ${title}</h4>${arr.map(x=>`<div class="exrow">${esc(x)}</div>`).join('')}</div>`:'';
  $('speak-body').innerHTML = `
    <div class="card"><b>📋 本次口說回饋${isLive?'(即時對話)':''}</b>
      ${sec('👏','做得好', fb.good)}
      ${sec('✏️','文法修正', fb.grammar)}
      ${sec('💬','更道地的說法', fb.better)}
      ${sec('🔊','發音提醒', fb.pron)}
      <div class="explain" style="margin-top:12px">💙 ${esc(fb.cheer||'')}</div></div>
    <button class="btn" onclick="renderSpeakSetup()">再練一個情境 🔁</button>
    <div style="height:10px"></div>
    <button class="btn ghost" onclick="showView('home')">回首頁</button>`;
}

/* ---- 即時對話(Gemini Live API,WebSocket)---- */
class LiveSession {
  constructor(sc){
    this.sc = sc; this.ws = null; this.micStream = null;
    this.inCtx = null; this.outCtx = null; this.proc = null;
    this.playTime = 0; this.closed = false;
    this.curIn = ''; this.curOut = '';
  }
  status(t){ const el = $('live-status'); if(el) el.textContent = t; }
  async start(){
    const key = apiKey(); if(!key) throw new Error('NO_KEY');
    const model = DB.settings.liveModel;
    this.status('連線中…');
    this.ws = new WebSocket(`wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${key}`);
    this.ws.onopen = ()=>{
      this.ws.send(JSON.stringify({setup:{
        model: 'models/'+model,
        generationConfig: {responseModalities: ['AUDIO']},
        systemInstruction: {parts:[{text:
          `You are a friendly English conversation partner for a Taiwanese child learner (elementary grade 3-4). Role-play: ${this.sc.en}. Speak VERY simple English, slowly, short sentences (max 2 per turn). Start the conversation by greeting the student. Be patient and encouraging. If the student is silent, gently prompt them.`}]},
        outputAudioTranscription: {},
        inputAudioTranscription: {}
      }}));
    };
    this.ws.onmessage = async ev=>{
      let data = ev.data;
      if(data instanceof Blob) data = await data.text();
      let msg; try{ msg = JSON.parse(data); }catch(_){ return; }
      if(msg.setupComplete){ this.status('🟢 已連線,開口說話吧!'); await this.openMic(); return; }
      const sc = msg.serverContent;
      if(!sc) return;
      if(sc.inputTranscription?.text){ this.curIn += sc.inputTranscription.text; this.renderLiveTranscript(); }
      if(sc.outputTranscription?.text){ this.curOut += sc.outputTranscription.text; this.renderLiveTranscript(); }
      if(sc.interrupted){ this.flushAudio(); }
      const parts = sc.modelTurn?.parts || [];
      for(const p of parts){
        if(p.inlineData?.data) this.playPCM(p.inlineData.data);
      }
      if(sc.turnComplete){
        if(this.curIn.trim()) speakState.transcript.push('Student: '+this.curIn.trim());
        if(this.curOut.trim()) speakState.transcript.push('AI: '+this.curOut.trim());
        this.curIn=''; this.curOut=''; this.renderLiveTranscript();
      }
    };
    this.ws.onerror = ()=>{ if(!this.closed){ this.status('⚠️ 連線失敗'); toast('Live 連線失敗,建議改用「簡易模式」'); } };
    this.ws.onclose = e=>{ if(!this.closed){ this.status('連線已中斷'); if(e.code!==1000) toast('Live 連線中斷('+e.code+'),可改用簡易模式'); } };
  }
  async openMic(){
    try{
      this.micStream = await navigator.mediaDevices.getUserMedia({audio:{channelCount:1, echoCancellation:true, noiseSuppression:true}});
    }catch(e){ this.status('⚠️ 無法使用麥克風'); toast('請允許麥克風權限後重試'); return; }
    this.inCtx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
    const src = this.inCtx.createMediaStreamSource(this.micStream);
    this.proc = this.inCtx.createScriptProcessor(4096, 1, 1);
    this.proc.onaudioprocess = e=>{
      if(this.ws?.readyState !== 1) return;
      const f32 = e.inputBuffer.getChannelData(0);
      const i16 = new Int16Array(f32.length);
      for(let i=0;i<f32.length;i++){ const s = Math.max(-1, Math.min(1, f32[i])); i16[i] = s<0 ? s*0x8000 : s*0x7FFF; }
      let bin=''; const bytes = new Uint8Array(i16.buffer);
      for(let i=0;i<bytes.length;i+=8192) bin += String.fromCharCode.apply(null, bytes.subarray(i,i+8192));
      this.ws.send(JSON.stringify({realtimeInput:{audio:{data:btoa(bin), mimeType:'audio/pcm;rate=16000'}}}));
    };
    src.connect(this.proc); this.proc.connect(this.inCtx.destination);
  }
  playPCM(b64){
    if(!this.outCtx) this.outCtx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:24000});
    const bin = atob(b64); const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    const i16 = new Int16Array(bytes.buffer);
    const f32 = new Float32Array(i16.length);
    for(let i=0;i<i16.length;i++) f32[i] = i16[i]/32768;
    const buf = this.outCtx.createBuffer(1, f32.length, 24000);
    buf.copyToChannel(f32, 0);
    const srcN = this.outCtx.createBufferSource(); srcN.buffer = buf; srcN.connect(this.outCtx.destination);
    const now = this.outCtx.currentTime;
    if(this.playTime < now) this.playTime = now + 0.05;
    srcN.start(this.playTime); this.playTime += buf.duration;
    this._sources = this._sources||[]; this._sources.push(srcN);
  }
  flushAudio(){ (this._sources||[]).forEach(s=>{try{s.stop()}catch(_){}}); this._sources=[]; this.playTime=0; }
  renderLiveTranscript(){
    const el = $('live-transcript'); if(!el) return;
    const hist = speakState.transcript.map(t=>{
      const me = t.startsWith('Student:');
      return `<div class="bub ${me?'me':'ai'} en">${esc(t.replace(/^\w+: /,''))}</div>`;
    }).join('');
    const cur = (this.curOut?`<div class="bub ai en" style="opacity:.7">${esc(this.curOut)}</div>`:'')
              + (this.curIn?`<div class="bub me en" style="opacity:.7">${esc(this.curIn)}</div>`:'');
    el.innerHTML = hist + cur;
    el.scrollTop = el.scrollHeight;
  }
  stop(){
    this.closed = true;
    try{ this.proc?.disconnect(); }catch(_){}
    try{ this.micStream?.getTracks().forEach(t=>t.stop()); }catch(_){}
    try{ this.inCtx?.close(); }catch(_){}
    try{ this.outCtx?.close(); }catch(_){}
    try{ this.ws?.close(1000); }catch(_){}
  }
}
async function startLive(sc){
  $('speak-body').innerHTML = `
    <div class="flexrow" style="margin-bottom:12px"><span class="tag">${sc.emo} ${sc.name} · 即時對話</span>
      <span class="spacer"></span><button class="btn small amber" onclick="endLive()">結束並看回饋</button></div>
    <div class="card center" style="padding:14px">
      <b id="live-status">準備中…</b>
      <p class="muted" style="margin:6px 0 0">直接開口講英文,AI 會即時用語音回答你。<br>聽不懂可以說 "Can you say that again?"</p>
    </div>
    <div class="chat" id="live-transcript" style="max-height:48dvh;overflow:auto"></div>`;
  speakState.live = new LiveSession(sc);
  try{ await speakState.live.start(); }
  catch(e){ toast('Live 啟動失敗,建議用簡易模式'); renderSpeakSetup(); }
}
async function endLive(){
  speakState.live?.stop();
  const tr = speakState.transcript.join('\n');
  if(!tr.trim()){ renderSpeakSetup(); return; }
  await showFeedback(tr, true);
}

/* ================= 設定 ================= */
function openSettings(){
  $('settings-sheet').innerHTML = `
    <h3 style="font-size:20px">⚙️ 設定</h3>
    <div class="sec"><h4>Gemini API 金鑰</h4>
      <input class="field en" id="set-key" value="${esc(apiKey())}" placeholder="AIza...">
    </div>
    <div class="sec"><h4>我的程度(影響出題與解說)</h4>
      <select class="field" id="set-level">
        ${['國小三、四年級','國小五、六年級','國中入門'].map(l=>`<option ${DB.settings.level===l?'selected':''}>${l}</option>`).join('')}
      </select></div>
    <div class="sec"><h4>Live 語音模型(進階,連不上時可改)</h4>
      <input class="field en" id="set-live" value="${esc(DB.settings.liveModel)}">
    </div>
    <div style="height:14px"></div>
    <button class="btn" onclick="saveSettings()">儲存設定 ✓</button>
    <div class="divider"></div>
    <div class="flexrow">
      <button class="btn ghost" onclick="exportData()">📤 匯出紀錄</button>
      <button class="btn ghost" onclick="$('import-file').click()">📥 匯入紀錄</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
    <div style="height:10px"></div>
    <button class="btn ghost" style="color:var(--bad)" onclick="resetAll()">🗑 清除全部資料</button>
    <p class="muted" style="margin-top:12px;font-size:12.5px">學習紀錄都存在這支手機裡。換手機前記得「匯出紀錄」備份!</p>`;
  $('settings-overlay').classList.add('show');
}
function saveSettings(){
  const k = $('set-key').value.trim();
  if(k) localStorage.setItem('ela_key', k);
  DB.settings.level = $('set-level').value;
  DB.settings.liveModel = $('set-live').value.trim() || DB.settings.liveModel;
  save(); $('settings-overlay').classList.remove('show'); toast('設定已儲存 ✓');
}
function exportData(){
  const blob = new Blob([JSON.stringify(DB,null,1)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `英語小日子備份-${todayStr()}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('已下載備份檔 ✓');
}
function importData(input){
  const f = input.files[0]; if(!f) return;
  const fr = new FileReader();
  fr.onload = ()=>{
    try{
      const d = JSON.parse(fr.result);
      if(!Array.isArray(d.words)) throw 0;
      DB = Object.assign(defaults(), d); save();
      toast('匯入成功 ✓'); $('settings-overlay').classList.remove('show'); renderHome();
    }catch(_){ toast('⚠️ 檔案格式不對,請選正確的備份檔'); }
  };
  fr.readAsText(f);
}
function resetAll(){
  if(!confirm('確定要清除全部學習紀錄?此動作無法復原!')) return;
  localStorage.removeItem('ela_data'); localStorage.removeItem('ela_key');
  location.reload();
}

/* ================= API Key 引導 ================= */
function saveKey(){
  const k = $('key-input').value.trim();
  if(!k || !k.startsWith('AIza')) return toast('金鑰好像不對,應該是 AIza 開頭');
  localStorage.setItem('ela_key', k);
  $('key-overlay').classList.remove('show');
  toast('設定完成,開始學習吧!🎉');
}

/* ================= 初始化 ================= */
(function init(){
  updateStreak();
  renderHome();
  if(!apiKey()) $('key-overlay').classList.add('show');
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  }
  // Enter 快捷查詢
  $('word-input').addEventListener('keydown', e=>{ if(e.key==='Enter') lookupWord(); });
  // 離開口說頁時關閉 Live
  document.addEventListener('visibilitychange', ()=>{ if(document.hidden && speakState.live){ speakState.live.stop(); } });
})();

</script>
